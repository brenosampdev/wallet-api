services:
  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring-boot-app
    ports:
      - "8080:8000"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SERVER_PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:16-alpine
    container_name: wallet_postgres
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${DB_NAME:-wallet}
      POSTGRES_USER: ${DB_USER:-wallet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wallet}
    ports:
      - ${DB_PORT-5432}:5432
    volumes:
      - wallet_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d wallet"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  wallet_pg_data:
